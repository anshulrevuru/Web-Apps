<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Calc | Premium Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-elements">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <div class="calculator-container">
        <div class="calculator-glass">
            <div class="display" id="calc-display">
                <div class="unit-indicator" id="unit-indicator">DEG</div>
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
                <div class="matrix-status" id="matrix-status" style="display: none;">Mode: Matrix</div>
                <div class="matrix-grid" id="matrix-grid" style="display: none;">
                    <input type="number" class="mat-cell" data-index="0" value="0">
                    <input type="number" class="mat-cell" data-index="1" value="0">
                    <input type="number" class="mat-cell" data-index="2" value="0">
                    <input type="number" class="mat-cell" data-index="3" value="0">
                    <input type="number" class="mat-cell" data-index="4" value="0">
                    <input type="number" class="mat-cell" data-index="5" value="0">
                    <input type="number" class="mat-cell" data-index="6" value="0">
                    <input type="number" class="mat-cell" data-index="7" value="0">
                    <input type="number" class="mat-cell" data-index="8" value="0">
                </div>
            </div>
            <div class="buttons">
                <!-- Row 1: Advanced Trig Left | Main Actions Right -->
                <button class="btn btn-operator" onclick="computeTrig('sec')">sec</button>
                <button class="btn btn-operator" onclick="computeTrig('csc')">csc</button>
                <button class="btn btn-operator" onclick="computeTrig('cot')">cot</button>
                <button class="btn btn-operator" id="unit-toggle" onclick="toggleUnit()">DEG</button>
                <button class="btn btn-clear span-two" onclick="clearDisplay()">AC</button>
                <button class="btn btn-delete" onclick="deleteNumber()">DEL</button>
                <button class="btn btn-operator" onclick="appendOperator('÷')">÷</button>

                <!-- Row 2: Primary Trig Left | Numbers 7-9 Right -->
                <button class="btn btn-operator" onclick="computeTrig('sin')">sin</button>
                <button class="btn btn-operator" onclick="computeTrig('cos')">cos</button>
                <button class="btn btn-operator" onclick="computeTrig('tan')">tan</button>
                <button class="btn btn-operator" onclick="appendNumber('Math.PI')">π</button>
                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn btn-operator" onclick="appendOperator('×')">×</button>

                <!-- Row 3: Inverse Trig Left | Numbers 4-6 Right -->
                <button class="btn btn-operator" onclick="computeTrig('asin')">asin</button>
                <button class="btn btn-operator" onclick="computeTrig('acos')">acos</button>
                <button class="btn btn-operator" onclick="computeTrig('atan')">atan</button>
                <button class="btn btn-operator" onclick="appendOperator('^')">xʸ</button>
                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn btn-operator" onclick="appendOperator('-')">-</button>

                <!-- Row 4: Hyperbolic Left | Numbers 1-3 Right -->
                <button class="btn btn-operator" onclick="computeTrig('sinh')">sinh</button>
                <button class="btn btn-operator" onclick="computeTrig('cosh')">cosh</button>
                <button class="btn btn-operator" onclick="computeTrig('tanh')">tanh</button>
                <button class="btn btn-operator" onclick="computeSqrt()">√</button>
                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

                <!-- Row 5: Inverse Hyperbolic Left | 0, Dot, Equals Right -->
                <button class="btn btn-operator" onclick="computeTrig('asinh')">asinh</button>
                <button class="btn btn-operator" onclick="computeTrig('acosh')">acosh</button>
                <button class="btn btn-operator" onclick="computeTrig('atanh')">atanh</button>
                <button class="btn btn-operator" onclick="appendOperator('↑↑')">x↑↑y</button>
                <button class="btn" onclick="appendNumber('0')">0</button>
                <button class="btn" onclick="appendNumber('.')">.</button>
                <button class="btn btn-equals span-two" onclick="compute()">=</button>

                <!-- Row 6: Matrix Controls & Extras -->
                <button class="btn btn-operator" onclick="toggleMatrixMode()" id="mat-btn">MAT</button>
                <button class="btn btn-operator" onclick="storeMatrix('A')">Set A</button>
                <button class="btn btn-operator" onclick="storeMatrix('B')">Set B</button>
                <button class="btn btn-operator" onclick="appendOperator('↑↑↑')">x↑↑↑y</button>
                <button class="btn btn-operator" style="opacity: 0.3; cursor: default">MOD</button>
                <button class="btn btn-operator" style="opacity: 0.3; cursor: default">EXP</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
