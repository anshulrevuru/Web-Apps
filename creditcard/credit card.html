<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MasterCard UI</title>
<link rel="stylesheet" href="credit card.css">
</head>
<body>

<div class="card">

    <div class="top">
        <div class="brand">
            <div class="mc-logo">
                <span class="red"></span>
                <span class="orange"></span>
            </div>
            <span class="brand-text">Master Card</span>
        </div>

        <div class="chip">
            <span></span>
            <span class="v"></span>
        </div>
    </div>

    <div class="number-section">
        <p class="label">Card Number</p>
        <p class="number">5432&nbsp;1098&nbsp;7654&nbsp;3210</p>
    </div>

    <div class="bottom">
        <div>
            <p class="label">Card Holder</p>
            <p class="value">Anshul Revuru</p>
        </div>

        <div class="valid">
            <p class="label">Valid Thru</p>
            <p class="value">05/34</p>
        </div>
    </div>

</div>

</body>
</html>
