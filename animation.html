<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tailwind Transitions & Transforms</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center bg-gray-100">

  <button
    class = "
      px-10 py-4
      text-lg font-semibold text-white
      bg-blue-500 rounded-lg

      transform
      transition-all duration-300 ease-in-out

      hover:bg-blue-700
      hover:-translate-y-2
      hover:rotate-3
      hover:scale-105

      active:scale-95
      "
  >
    Hover & Click Me
  </button>

</body>
</html>
