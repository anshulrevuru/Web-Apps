<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Calculator using JS</title>
    <link rel="stylesheet" href="calc.css">
</head>
<body>
<div class="container">
    <div class="calculator">
        <form>
            <div class="display">
                <input type="text" name="display">
            </div>
            <div>
                <input type="btn" value="**" onclick="display.value += '**' ">
                <input type="btn" value="log" onclick="calculateLog()">
                <input type="btn" value="e" onclick="calculateExp()">
            </div>
            <div>
                <input type="btn" value="AC" onclick="display.value = '' ">
                <input type="btn" value="DEL" onclick="display.value = display.value.toString ().slice (0, -1)">
                <input type="btn" value="." onclick="display.value += '.' ">
                <input type="btn" value="/" onclick="display.value += ' / ' ">
            </div>
            <div>
                <input type="btn" value="7" onclick="display.value += '7' ">
                <input type="btn" value="8" onclick="display.value += '8' ">
                <input type="btn" value="9" onclick="display.value += '9' ">
                <input type="btn" value="*" onclick="display.value += ' * ' ">
            </div>
            <div>
                <input type="btn" value="4" onclick="display.value += '4' ">
                <input type="btn" value="5" onclick="display.value += '5' ">
                <input type="btn" value="6" onclick="display.value += '6' ">
                <input type="btn" value="-" onclick="display.value += ' - ' ">
            </div>
            <div>
                <input type="btn" value="1" onclick="display.value += '1' ">
                <input type="btn" value="2" onclick="display.value += '2' ">
                <input type="btn" value="3" onclick="display.value += '3' ">
                <input type="btn" value="+" onclick="display.value += ' + ' ">
            </div>
             <div>
                <input type="btn" value="(" onclick="display.value += '(' ">
                <input type="btn" value=")" onclick="display.value += ')' ">
                <input type="btn" value="0" onclick="display.value += '0' ">
                <input type="btn" value="=" class="equal" onclick="display.value = eval (display.value)" class="equal">
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
